# 本机运行 — 127.0.0.1:1082 代理（Shadowrocket 默认端口）

environment: local_cn
mode: live

proxy:
  enabled: true
  socks5_url: "socks5://127.0.0.1:1082"
  http_url: "http://127.0.0.1:1082"

entry_max_price: 0.99
# 单场最大买入 20 USDC，逐级 FOK：20 → 10 → 5
max_round_notional_usd: 20
order_ladder_usd: [20, 10, 5]
min_ladder_step_usd: 5
market_cooldown_sec: 3600

# ---- 价格驱动早进场策略（不死等 final）----
early_entry_enabled: true
# 买入窗口：卖价在 [early_entry_price, entry_max_price] 内即下单（默认 0.60~0.99）
early_entry_price: 0.60
football_min_elapsed_min: 80
# 净胜球分差 > 此值时立即买入领先方，不等 80 分钟（2 → 分差≥3 触发）
football_blowout_lead: 2
football_fallback_wallclock_min: 95
# NBA 默认 false：仅终局赛果下单；true 则第四节起可走直播早进场
nba_early_entry_enabled: false
nba_min_period: 4

gamma_sync_interval_sec: 900
sports_poll_live_sec: 2
sports_poll_idle_sec: 60
clob_eligible_poll_sec: 1.5

# ---- 各数据源每分钟限流（分开计数）----
rate_football_data_per_min: 10
rate_api_football_per_min: 10
rate_thesportsdb_per_min: 30
rate_balldontlie_per_min: 5
# ESPN soccer + NBA + NFL 三端共享此额度（单令牌桶）
rate_espn_per_min: 60
rate_openligadb_per_min: 15
rate_nba_api_per_min: 10
rate_mlb_per_min: 30
rate_nhl_per_min: 30
api_football_daily_quota: 95
# 电竞数据源限流（PandaScore CS2+LoL 共享桶，1000次/小时免费额度）
rate_pandascore_per_min: 15
rate_lolesports_per_min: 20

# API key 也可写在项目根 polymarket-arb.env（优先于 YAML）
thesportsdb_key: "123"
# pandascore_key: ""        # 注册 pandascore.co 后填入，或设置 PANDASCORE_KEY 环境变量
# lolesports_api_key: ""    # 默认使用前端内嵌 key，可按需更新

sports: [football, nba, mlb, nhl]
# 电竞：需在 pandascore.co 注册免费 API Key 后启用
# sports: [football, nba, mlb, nhl, cs2, lol]

espn_soccer_leagues:
  - fifa.friendly
  - fifa.world
  - fifa.worldq.uefa
  - fifa.worldq.conmebol
  - fifa.worldq.concacaf
  - fifa.worldq.afc
  - fifa.worldq.caf
  - uefa.nations
  - conmebol.america
  - jpn.1
  - esp.2
  - bra.1
  - eng.1
  - esp.1
  - ger.1
  - ita.1
  - fra.1
  - usa.1
  - uefa.champions
  - uefa.europa

# 本机相对路径（相对项目根目录）
db_path: "data/arb.db"
log_path: "logs/arb.jsonl"

# 可视化 Dashboard（http://127.0.0.1:8787）
dashboard_enabled: true
dashboard_host: "127.0.0.1"
dashboard_port: 8787
# 成交/错过每页条数；Watchlist 开赛后保留小时数
history_page_size: 10
watchlist_grace_hours: 2

# ---- 持仓结算 ----
auto_redeem_enabled: true
redeem_poll_sec: 120
# curPrice = 1.0（100%）时才自动/手动结算
redeem_price_threshold: 1.0
polygon_rpc_url: "https://polygon-rpc.com"
